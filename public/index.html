<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Send Email</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Instrument Sans', sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: #ffffff;
      border-radius: 12px;
      border: 1px solid #e2e2dd;
      padding: 40px;
      width: 100%;
      max-width: 500px;
    }

    .top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid #ebebeb;
    }

    .icon {
      width: 32px;
      height: 32px;
      background: #1a1a1a;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg { width: 16px; height: 16px; }

    h1 {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .from-badge {
      margin-left: auto;
      font-size: 12px;
      color: #888;
      background: #f5f5f0;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid #e2e2dd;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
    }

    input, textarea {
      width: 100%;
      padding: 10px 13px;
      border: 1px solid #ddd;
      border-radius: 7px;
      font-family: 'Instrument Sans', sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #fafafa;
      outline: none;
      transition: border-color 0.15s;
      resize: none;
    }

    input::placeholder, textarea::placeholder { color: #bbb; }

    input:focus, textarea:focus {
      border-color: #1a1a1a;
      background: #fff;
    }

    textarea { height: 120px; line-height: 1.6; }

    button {
      width: 100%;
      padding: 11px;
      margin-top: 6px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-family: 'Instrument Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background 0.15s;
    }

    button:hover { background: #333; }
    button:disabled { background: #999; cursor: not-allowed; }

    button svg { width: 14px; height: 14px; }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    .msg {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 7px;
      font-size: 13px;
      display: none;
    }

    .msg.success { display: block; background: #f0faf0; color: #2d7a2d; border: 1px solid #c3e6c3; }
    .msg.error   { display: block; background: #fff5f5; color: #c0392b; border: 1px solid #f5c6c6; }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="top">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="m2 7 10 7 10-7"/>
        </svg>
      </div>
      <h1>Send Email</h1>
    </div>

    <div class="field">
      <label>To</label>
      <input id="toEmail" type="email" placeholder="recipient@example.com" />
    </div>

    <div class="field">
      <label>Subject</label>
      <input id="subject" type="text" placeholder="Enter subject..." />
    </div>

    <div class="field">
      <label>Message</label>
      <textarea id="message" placeholder="Write your message..."></textarea>
    </div>

    <button id="btn" onclick="sendEmail()">
      <span id="btnText">Send</span>
      <svg id="btnIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
      <div class="spinner" id="spinner"></div>
    </button>

    <div class="msg" id="msg"></div>
  </div>

  <script>
    async function sendEmail() {
      const toEmail = document.getElementById('toEmail').value.trim();
      const subject = document.getElementById('subject').value.trim();
      const message = document.getElementById('message').value.trim();
      const btn     = document.getElementById('btn');
      const msg     = document.getElementById('msg');

      msg.className = 'msg';

      if (!toEmail || !subject || !message) {
        msg.className = 'msg error';
        msg.textContent = 'Please fill in all fields.';
        return;
      }

      btn.disabled = true;
      document.getElementById('btnText').textContent = 'Sending...';
      document.getElementById('btnIcon').style.display = 'none';
      document.getElementById('spinner').style.display = 'block';

      try {
        const res  = await fetch('/sendemail', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: toEmail, subject, message }),
        });
        const data = await res.json();

        if (res.ok) {
          msg.className = 'msg success';
          msg.textContent = 'Email sent successfully!';
          document.getElementById('toEmail').value  = '';
          document.getElementById('subject').value  = '';
          document.getElementById('message').value  = '';
        } else {
          msg.className = 'msg error';
          msg.textContent = data.error || 'Something went wrong.';
        }
      } catch {
        msg.className = 'msg error';
        msg.textContent = 'Could not reach the server.';
      } finally {
        btn.disabled = false;
        document.getElementById('btnText').textContent = 'Send';
        document.getElementById('btnIcon').style.display = 'block';
        document.getElementById('spinner').style.display = 'none';
      }
    }

    document.getElementById('message').addEventListener('keydown', e => {
      if (e.ctrlKey && e.key === 'Enter') sendEmail();
    });
  </script>
</body>
</html>
